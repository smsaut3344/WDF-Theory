<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LACR Theory | 时空流形的数据重整化理论</title>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@pyscript/core@2023.11.1/dist/core.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@pyscript/core@2023.11.1/dist/core.js"></script>
    
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --border-color: #30363d;
            --sidebar-bg: #161b22;
            --terminal-bg: #011627;
        }
        
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: row; 
            flex-wrap: nowrap;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        
        body.lang-en .zh { display: none !important; }
        body.lang-zh .en { display: none !important; }

        /* 防漏锁：严防内核加载未完成时浏览器乱吐 Python 源码 */
        py-script, py-config, script[type="py"] {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            position: absolute !important;
            z-index: -9999 !important;
        }

        .sidebar {
            width: 280px;
            min-width: 280px;
            flex-shrink: 0;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        .sidebar h2 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 30px;
            font-size: 1.5em;
            letter-spacing: 1px;
        }
        
        .nav-btn {
            background: none;
            border: none;
            color: var(--text-color);
            padding: 15px 25px;
            text-align: left;
            font-size: 1.05em;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }
        
        .nav-btn:hover { background-color: #21262d; color: #fff; }
        .nav-btn.active {
            border-left: 3px solid var(--accent-color);
            background-color: #21262d;
            color: #fff;
            font-weight: bold;
        }
        
        .lang-switch {
            margin-top: 20px;
            margin-bottom: 20px;
            padding: 10px 25px;
            text-align: center;
        }
        
        .lang-switch button {
            background-color: #21262d;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .lang-switch button:hover { border-color: var(--accent-color); color: #fff; }

        .content {
            flex: 1;
            min-width: 0;
            padding: 40px 80px;
            overflow-y: auto;
            overflow-x: hidden;
            line-height: 1.8;
            position: relative;
            box-sizing: border-box;
        }
        
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; min-width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border-color); }
            .content { padding: 20px 30px; }
        }
        
        #dynamic-content .page { animation: fadeIn 0.4s ease-in-out; padding-bottom: 120px;}
        #dynamic-content h1, #dynamic-content h2, #dynamic-content h3 { color: #fff; margin-top: 1.5em; }
        #dynamic-content h1 { border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-top: 0; }
        .highlight-box {
            background-color: #1f2428;
            border-left: 4px solid var(--accent-color);
            padding: 15px;
            margin: 20px 0;
            border-radius: 0 4px 4px 0;
        }
        
        .run-btn {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin: 15px 0;
            transition: background 0.2s;
        }
        .run-btn:hover { background-color: #2ea043; }
        
        .terminal-box {
            background-color: var(--terminal-bg);
            color: #4af626;
            font-family: "Courier New", Courier, monospace;
            padding: 20px;
            border-radius: 6px;
            min-height: 200px;
            border: 1px solid #003b57;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            white-space: pre-wrap;
        }

        .footer-box {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: #8b949e;
            font-size: 0.9em;
            width: 100%;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="lang-zh"> 

    <div class="sidebar">
        <h2>LACR Engine</h2>
        <button class="nav-btn active" onclick="loadModule('home.html', this)">
            <span class="zh">📚 核心理念与战绩</span><span class="en">📚 Core & Results</span>
        </button>
        <button class="nav-btn" onclick="loadModule('paper.html', this)">
            <span class="zh">📄 广义协变场论</span><span class="en">📄 Covariant Field Theory</span>
        </button>
        <button class="nav-btn" onclick="loadModule('math.html', this)">
            <span class="zh">📐 数学与群论推导</span><span class="en">📐 Group Theory & Math</span>
        </button>
        <button class="nav-btn" onclick="loadModule('predictions.html', this)">
            <span class="zh">🔭 刚性前瞻预言</span><span class="en">🔭 Rigorous Predictions</span>
        </button>
        <button class="nav-btn" onclick="loadModule('pipeline.html', this)">
            <span class="zh">⚙️ 在线 Python 盲测</span><span class="en">⚙️ Live Python Pipeline</span>
        </button>
        
        <div class="lang-switch">
            <button onclick="toggleLanguage()">🌐 中 / EN Switch</button>
        </div>
    </div>

    <div class="content">
        <div id="dynamic-content"></div>

        <div class="footer-box">
            <p>
                <span class="zh">© 2026 Andy(文大方) - LACR Theory. 保留所有权利。</span>
                <span class="en">© 2026 Andy(Wen Dafang) - LACR Theory. All Rights Reserved.</span>
            </p>
            <p>
                <span class="zh">学术探讨、严谨盲审与合作，请联系作者：</span>
                <span class="en">For rigorous peer review and collaboration, contact: </span>
                <a href="mailto:smsaut3344@gmail.com" style="color: var(--accent-color); text-decoration: none; font-weight: bold;">smsaut3344@gmail.com</a>
            </p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userLang = navigator.language || navigator.userLanguage;
            if (userLang.toLowerCase().startsWith('zh')) {
                setLanguage('zh');
            } else {
                setLanguage('en');
            }
            loadModule('home.html', document.querySelector('.nav-btn.active'));
        });

        function setActiveButton(btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function loadModule(filename, btn) {
            setActiveButton(btn);
            const dynamicContainer = document.getElementById('dynamic-content');
            
            fetch(filename + '?v=' + new Date().getTime())
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.text();
                })
                .then(html => {
                    dynamicContainer.innerHTML = html;
                    dynamicContainer.style.display = 'block';
                    
                    // 动态注入后，根据全局 body 状态强行刷新中英隐藏标志位
                    const currentLang = document.body.classList.contains('lang-en') ? 'en' : 'zh';
                    setLanguage(currentLang);
                    
                    if (window.MathJax) { MathJax.typesetPromise(); }
                })
                .catch(error => {
                    dynamicContainer.innerHTML = `<h2 style="color:red">Loading Error: Please push ${filename} to GitHub Pages.</h2>`;
                });
        }

        function setLanguage(lang) {
            const body = document.body;
            body.classList.remove('lang-zh', 'lang-en');
            body.classList.add('lang-' + lang);
            
            document.querySelectorAll('.zh, .en').forEach(el => el.style.display = ''); 
            if(lang === 'en') {
                document.querySelectorAll('.zh').forEach(el => el.style.setProperty('display', 'none', 'important'));
            } else {
                document.querySelectorAll('.en').forEach(el => el.style.setProperty('display', 'none', 'important'));
            }
        }

        function toggleLanguage() {
            const body = document.body;
            if (body.classList.contains('lang-zh')) {
                setLanguage('en');
            } else {
                setLanguage('zh');
            }
        }
    </script>
</body>
</html>
