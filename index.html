    constructor() {
        this.a0 = Math.pow(10, -9.92);
        this.c1 = 1.0 / (24.0 * Math.sqrt(2.0));
        this.c2 = 1.0 / (12.0 * Math.sqrt(2.0));
        // [新增刚性底账] 12通道本源投影比
        this.lattice_ratio = 0.12;

    sparc_limit(g_bar) {
        // [WDF核心机制：点火梯度大闸] 阈值 = a0 * (0.12)^2
        const ignition_gradient = this.a0 * Math.pow(this.lattice_ratio, 2);

        if (g_bar < ignition_gradient) {

            };

        return {
            g_obs: g_obs_amplified,
            ignited: true,

        const activation = this.c1 * Math.pow(vector, 2);

        return (1 + activation) * (1 + shield);
    }
}

/* =======================================================
   SPA 手机响应式控制与路由大盘
======================================================= */
document.addEventListener('DOMContentLoaded', () => {
    const userLang = navigator.language || navigator.userLanguage;
    if (userLang.toLowerCase().startsWith('zh')) {
        setLanguage('zh');
    } else {
        setLanguage('en');
    }
    // 首次加载初始化页面
    loadModule('foundation.html', document.querySelector('.nav-btn.active'));
});

// 手机端呼出/收回侧边栏
function toggleSidebar() {
    const sidebar = document.querySelector('.sidebar');
    const overlay = document.querySelector('.sidebar-overlay');
    sidebar.classList.toggle('active-drawer');
    overlay.classList.toggle('active-drawer');
}

function setActiveButton(btn) {
    if(!btn) return;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function loadModule(filename, btn) {
    setActiveButton(btn);
    const dynamicContainer = document.getElementById('dynamic-content');
    
    // 如果是手机端（侧边栏为滑出状态），点击按钮后自动收回
    if (window.innerWidth <= 800) {
        const sidebar = document.querySelector('.sidebar');
        if(sidebar.classList.contains('active-drawer')) {
            toggleSidebar();
        }
    }
    
    fetch(filename + '?v=' + new Date().getTime())
        .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.text();
        })
        .then(html => {
            dynamicContainer.innerHTML = html;
            dynamicContainer.style.display = 'block';
            
            // 页面切换后，自动滚回顶部（PC和手机端双重保障）
            const contentArea = document.getElementById('main-content-scroll');
            if (contentArea) contentArea.scrollTo(0, 0);
            window.scrollTo(0, 0);
            
            const currentLang = document.body.classList.contains('lang-en') ? 'en' : 'zh';
            setLanguage(currentLang);
            
            if (window.MathJax) { MathJax.typesetPromise(); }
        })
        .catch(error => {
            dynamicContainer.innerHTML = `<h2 style="color:red">Loading Error: Please push ${filename} to GitHub Pages.</h2>`;
        });
}

// 核心修复：100% 依赖最高效的 CSS 类名进行语言切换，抛弃所有内联 JS style 干预
function setLanguage(lang) {
    const body = document.body;
    body.classList.remove('lang-zh', 'lang-en');
    body.classList.add('lang-' + lang);

    // 强力接管全站下拉框选项的双语切换
    document.querySelectorAll('option[data-zh][data-en]').forEach(opt => {
        opt.text = lang === 'en' ? opt.dataset.en : opt.dataset.zh;
    });
}

function toggleLanguage() {
    if (document.body.classList.contains('lang-zh')) {
        setLanguage('en');
    } else {
        setLanguage('zh');
    }
}
