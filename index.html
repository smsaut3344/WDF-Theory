    constructor() {
        this.a0 = Math.pow(10, -9.92);
        this.c1 = 1.0 / (24.0 * Math.sqrt(2.0));
        this.c2 = 1.0 / (12.0 * Math.sqrt(2.0));
    }

    sparc_limit(g_bar) {
        const x = g_bar / this.a0;
        return g_bar * Math.pow(1 + Math.pow(x, -2), 0.25);
    }

    collision_manifold(vector, congestion) {
        const activation = this.c1 * Math.pow(Math.max(0, vector), 2);
        const shield = this.c2 * Math.pow(congestion * (1 - vector), 2);
        return (1 + activation) / (1 + shield);
    }
}

/* =======================================================

document.addEventListener('DOMContentLoaded', () => {
    const userLang = navigator.language || navigator.userLanguage;
    if (userLang.toLowerCase().startsWith('zh')) {
        setLanguage('zh');
    } else {
        setLanguage('en');
    }
    loadModule('foundation.html', document.querySelector('.nav-btn.active'));
});

function setActiveButton(btn) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function loadModule(filename, btn) {
    setActiveButton(btn);
    const dynamicContainer = document.getElementById('dynamic-content');
    
    fetch(filename + '?v=' + new Date().getTime())
        .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.text();
        })
        .then(html => {
            dynamicContainer.innerHTML = html;
            dynamicContainer.style.display = 'block';
            
            const currentLang = document.body.classList.contains('lang-en') ? 'en' : 'zh';
            setLanguage(currentLang);
            
            if (window.MathJax) { MathJax.typesetPromise(); }
        })
        .catch(error => {
            dynamicContainer.innerHTML = `<h2 style="color:red">Loading Error: Please push ${filename} to GitHub Pages.</h2>`;
        });
}

function setLanguage(lang) {
    const body = document.body;
    body.classList.remove('lang-zh', 'lang-en');
    body.classList.add('lang-' + lang);
    
    document.querySelectorAll('.zh, .en').forEach(el => el.style.display = ''); 
    if(lang === 'en') {
        document.querySelectorAll('.zh').forEach(el => el.style.setProperty('display', 'none', 'important'));
    } else {
        document.querySelectorAll('.en').forEach(el => el.style.setProperty('display', 'none', 'important'));
    }
}

function toggleLanguage() {
    const body = document.body;
    if (body.classList.contains('lang-zh')) {
        setLanguage('en');
    } else {
        setLanguage('zh');
    }
}
